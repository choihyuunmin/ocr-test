<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f1f5fb">
  <title>OCR 뷰어 - 단어 검색</title>
  <style>
    /* moleg-search light 테마와 유사 (sky / primary #0369A1) */
    :root {
      --bg: #f1f5fb;
      --bg-elevated: #ffffff;
      --surface: #ffffff;
      --border: #e5e8eb;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #0369a1;
      --accent-hover: #0284c7;
      --accent-soft: rgba(3, 105, 161, 0.12);
      --accent-ring: rgba(3, 105, 161, 0.25);
      --sky-tint: #e0f2fe;
      --match-other: #0d9488;
      --match-other-fill: rgba(13, 148, 136, 0.12);
      --match-active: #d97706;
      --match-active-fill: rgba(217, 119, 6, 0.15);
      --danger-soft: #fee2e2;
      --danger-text: #b91c1c;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 4px 16px rgba(15, 23, 42, 0.08);
      --header-pad-x: clamp(0.75rem, 3vw, 1.5rem);
      --header-inner-max: min(920px, 100%);
      --search-row-h: 2.75rem;
    }

    * { box-sizing: border-box; }
    html {
      scroll-padding-top: clamp(5.5rem, 14vw, 8.5rem);
    }
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background:
        radial-gradient(100% 80% at 50% -20%, rgba(56, 189, 248, 0.14), transparent 55%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0.875rem var(--header-pad-x);
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.04);
    }

    .header-inner {
      max-width: var(--header-inner-max);
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.625rem;
    }
    @media (min-width: 640px) {
      .header-inner {
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        gap: 0.75rem 1rem;
      }
    }

    .btn {
      padding: 0 0.875rem;
      min-height: 2.25rem;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.8125rem;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease,
        transform 0.12s ease, box-shadow 0.15s ease;
    }
    .btn:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 2px 10px rgba(3, 105, 161, 0.22);
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-nav {
      min-width: 3.25rem;
      height: calc(var(--search-row-h) - 6px);
      padding-left: 0.65rem;
      padding-right: 0.65rem;
      font-size: 0.8125rem;
    }

    .search-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 0.5rem;
      min-height: var(--search-row-h);
      padding: 4px 6px 4px 10px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }
    .search-panel:focus-within {
      border-color: #7dd3fc;
      box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-sm),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .search-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      flex-shrink: 0;
      color: var(--accent);
      border-radius: 8px;
      background: var(--accent-soft);
    }
    .search-icon svg {
      width: 18px;
      height: 18px;
      opacity: 0.92;
    }

    .search-input-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
    }

    .search-input-wrap input {
      width: 100%;
      min-width: 0;
      height: calc(var(--search-row-h) - 8px);
      padding: 0 0.35rem 0 0;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.9375rem;
      line-height: 1.35;
    }
    .search-input-wrap input:focus { outline: none; }
    .search-input-wrap input::placeholder { color: #94a3b8; }
    .search-input-wrap input:disabled { opacity: 0.5; }

    .search-actions {
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      padding-right: 4px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(3, 105, 161, 0.2);
      background: rgba(255, 255, 255, 0.85);
    }
    .search-actions .btn-nav {
      margin: 0;
      border-radius: 0;
      min-height: calc(var(--search-row-h) - 10px);
      background: transparent;
      color: var(--accent);
      box-shadow: none !important;
    }
    .search-actions .btn-nav:hover:not(:disabled) {
      background: var(--sky-tint);
    }
    .search-actions .btn-nav:active:not(:disabled) {
      background: #bae6fd;
    }
    .search-actions .btn-nav:first-of-type {
      border-right: 1px solid rgba(3, 105, 161, 0.16);
    }

    @media (max-width: 399px) {
      .search-panel {
        flex-wrap: wrap;
        padding: 8px 10px 8px 10px;
        row-gap: 0.5rem;
      }
      .search-actions {
        width: 100%;
        padding-right: 0;
        justify-content: stretch;
      }
      .search-actions .btn-nav {
        flex: 1;
      }
    }

    .header-meta {
      display: flex;
      flex-direction: row;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 0.75rem;
      flex-shrink: 0;
    }
    @media (min-width: 640px) {
      .header-meta {
        justify-content: flex-end;
      }
    }

    .match-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      min-height: 2rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--text);
    }
    .match-badge.has-results {
      border-color: #bae6fd;
      background: var(--sky-tint);
      color: #0369a1;
    }
    .match-badge.no-results {
      border-color: #fecaca;
      background: var(--danger-soft);
      color: var(--danger-text);
    }
    .match-badge:empty { display: none; }
    .match-badge .sep { opacity: 0.45; font-weight: 400; }
    .match-hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.4;
    }
    @media (min-width: 900px) {
      .match-hint { display: none; }
    }

    .content {
      padding: clamp(1rem, 4vw, 1.75rem) var(--header-pad-x) 2.5rem;
      max-width: var(--header-inner-max);
      margin: 0 auto;
      width: 100%;
    }

    .page-card {
      scroll-margin-top: clamp(5.5rem, 14vw, 8.5rem);
      background: var(--surface);
      border-radius: 0.75rem;
      overflow: hidden;
      margin-bottom: clamp(1rem, 3vw, 1.75rem);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .page-card.highlight {
      border-color: #fbbf24;
      box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.35), var(--shadow-md);
    }
    .page-header {
      padding: 0.6rem 1rem;
      background: linear-gradient(90deg, var(--sky-tint), transparent);
      font-size: 0.8125rem;
      font-weight: 600;
      color: #475569;
      letter-spacing: 0.02em;
      border-bottom: 1px solid var(--border);
    }
    .page-body {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }
    .page-img {
      display: block;
      max-width: 100%;
      height: auto;
      vertical-align: top;
    }
    .page-overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
    .text-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      -webkit-user-select: text;
      user-select: text;
      cursor: text;
      color: transparent;
      line-height: 1;
      overflow: visible;
      z-index: 1;
    }
    .text-layer span {
      position: absolute;
      white-space: pre;
      color: transparent;
      -webkit-user-select: text;
      user-select: text;
      display: inline-block;
      pointer-events: auto;
    }
    .text-layer span::selection {
      background: rgba(3, 105, 161, 0.3);
      color: transparent;
    }
    .word-box {
      position: absolute;
      border: 2px solid transparent;
      background: transparent;
      border-radius: 3px;
      transition: opacity 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      pointer-events: none;
    }
    .word-box.dim { opacity: 0.22; }
    .word-box.match {
      border-color: var(--match-other);
      background: var(--match-other-fill);
      box-shadow: 0 0 0 1px rgba(13, 148, 136, 0.25);
    }
    .word-box.match-active {
      scroll-margin-top: clamp(5.5rem, 14vw, 8.5rem);
      border-color: var(--match-active);
      background: var(--match-active-fill);
      box-shadow: 0 0 0 2px rgba(217, 119, 6, 0.45), 0 0 16px rgba(217, 119, 6, 0.2);
      z-index: 2;
      animation: pulse-ring 1.4s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 2px rgba(217, 119, 6, 0.45), 0 0 14px rgba(217, 119, 6, 0.15); }
      50% { box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.55), 0 0 22px rgba(217, 119, 6, 0.28); }
    }
    @media (prefers-reduced-motion: reduce) {
      .word-box.match-active { animation: none; }
    }

    .empty-state {
      text-align: center;
      padding: clamp(2rem, 8vw, 4rem) clamp(1rem, 4vw, 2rem);
      color: var(--muted);
      max-width: 28rem;
      margin: 0 auto;
    }
    .empty-state p { margin: 0.5rem 0; line-height: 1.65; }
    .empty-state .lead {
      font-size: clamp(1rem, 2.5vw, 1.125rem);
      font-weight: 600;
      color: var(--text);
    }
    .empty-state code {
      font-size: 0.88em;
      background: #f1f5f9;
      padding: 0.12em 0.4em;
      border-radius: 0.25rem;
      border: 1px solid var(--border);
    }
    .loading { opacity: 0.65; pointer-events: none; }
    .loading-msg { color: var(--accent); }
    .external-focus-rect {
      position: absolute;
      border: 3px solid var(--match-active);
      background: var(--match-active-fill);
      pointer-events: none;
      z-index: 3;
      box-shadow: 0 0 0 2px rgba(217, 119, 6, 0.25);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="search-panel" id="searchPanel" role="search">
        <span class="search-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
        </span>
        <div class="search-input-wrap">
          <input type="search" id="searchInput" placeholder="문서에서 검색…" autocomplete="off" disabled aria-label="문서 검색">
        </div>
        <div class="search-actions">
          <button type="button" class="btn btn-nav" id="prevBtn" disabled title="이전 일치 (Shift+Enter)">이전</button>
          <button type="button" class="btn btn-nav" id="nextBtn" disabled title="다음 일치 (Enter)">다음</button>
        </div>
      </div>
      <div class="header-meta">
        <span class="match-badge" id="matchBadge" aria-live="polite"></span>
        <p class="match-hint">Enter: 다음 · Shift+Enter: 이전</p>
      </div>
    </div>
  </header>

  <main class="content" id="content">
    <div class="empty-state">
      <p class="lead">문서가 없습니다.</p>
      <p>앱에서 연 세션 링크(<code>?token=…</code>)로 열면 OCR 결과가 표시됩니다. 검색어를 입력하면 일치하는 단어가 강조됩니다.</p>
    </div>
  </main>

  <script>
    let data = null;
    let matches = [];
    let currentMatchIndex = -1;

    const searchInput = document.getElementById('searchInput');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const matchBadge = document.getElementById('matchBadge');
    const content = document.getElementById('content');

    function render() {
      if (!data?.pages?.length) {
        content.innerHTML = '<div class="empty-state"><p>유효한 OCR 데이터가 없습니다.</p></div>';
        return;
      }

      content.innerHTML = data.pages.map((page, i) => {
        const imgSrc = page.image ? `data:image/png;base64,${page.image}` : '';
        const w = page.width || 800;
        const h = page.height || 600;
        
        const textSpans = (page.texts || []).map((t, textIdx) => {
          const b = t.bbox;
          if (!b || b.length < 4) return '';
          const [x1, y1, x2, y2] = b;
          const boxH = y2 - y1;
          const boxW = x2 - x1;
          const fs = Math.max(6, Math.round(boxH * 0.72));
          const text = t.text || '';
          return `<span data-page="${i}" data-text-idx="${textIdx}" 
            style="left:${x1}px;top:${y1}px;width:${boxW}px;height:${boxH}px;font-size:${fs}px;line-height:${boxH}px">${escapeHtml(text)}</span>`;
        }).join('');
        
        const boxes = (page.texts || []).map((t, textIdx) => {
          const b = t.bbox;
          if (!b || b.length < 4) return '';
          const [x1, y1, x2, y2] = b;
          const boxH = y2 - y1;
          return `<div class="word-box" data-page="${i}" data-text-idx="${textIdx}" data-text="${escapeHtml(t.text)}" 
            style="left:${x1}px;top:${y1}px;width:${x2-x1}px;height:${boxH}px"></div>`;
        }).join('');
        
        return `
          <div class="page-card" id="page-${i}" data-page-index="${i}">
            <div class="page-header">페이지 ${page.page}</div>
            <div class="page-body" data-natural-w="${w}" data-natural-h="${h}">
              <img class="page-img" src="${imgSrc}" alt="Page ${page.page}">
              <div class="page-overlay" style="width:${w}px;height:${h}px">
                <div class="text-layer">${textSpans}</div>
                ${boxes}
              </div>
            </div>
          </div>`;
      }).join('');

      searchInput.disabled = false;

      const finishNavHint = () => {
        const hint = window.__pendingNavHint;
        window.__pendingNavHint = null;
        if (hint) applyNavigationHint(hint);
      };
      let pendingImages = 0;
      document.querySelectorAll('.page-body').forEach(body => {
        const img = body.querySelector('.page-img');
        const overlay = body.querySelector('.page-overlay');
        if (!img || !overlay) return;
        pendingImages += 1;
        const scale = () => {
          const r = img.getBoundingClientRect();
          const sc = r.width / img.naturalWidth;
          overlay.style.transform = `scale(${sc})`;
          overlay.style.transformOrigin = 'top left';
          overlay.style.width = img.naturalWidth + 'px';
          overlay.style.height = img.naturalHeight + 'px';
        };
        const done = () => {
          scale();
          if (--pendingImages <= 0) finishNavHint();
        };
        if (img.complete) done();
        else img.addEventListener('load', done, { once: true });
      });
      if (pendingImages === 0) finishNavHint();

      doSearch();
    }

    function applyNavigationHint(meta) {
      document.querySelectorAll('.external-focus-rect').forEach(el => el.remove());
      
      if (!meta || !data?.pages?.length) return;
      const targetPage = meta.page;
      const bbox = meta.bbox;
      const article = meta.article_title;

      let pageIdx = 0;
      if (targetPage != null) {
        const found = data.pages.findIndex((p) => p.page === targetPage);
        if (found >= 0) pageIdx = found;
      }

      const card = document.getElementById(`page-${pageIdx}`);
      if (card) {
        document.querySelectorAll('.page-card').forEach(c => c.classList.remove('highlight'));
        card.classList.add('highlight');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      if (bbox && bbox.x0 != null && bbox.y0 != null && bbox.x1 != null && bbox.y1 != null) {
        const body = card && card.querySelector('.page-body');
        const overlay = body && body.querySelector('.page-overlay');
        const img = body && body.querySelector('.page-img');
        if (overlay && img && img.naturalWidth) {
          const w = img.naturalWidth;
          const h = img.naturalHeight;
          const el = document.createElement('div');
          el.className = 'external-focus-rect';
          el.style.left = (bbox.x0 * w) + 'px';
          el.style.top = (bbox.y0 * h) + 'px';
          el.style.width = Math.max(8, (bbox.x1 - bbox.x0) * w) + 'px';
          el.style.height = Math.max(8, (bbox.y1 - bbox.y0) * h) + 'px';
          overlay.appendChild(el);
          
          setTimeout(() => {
            el.style.transition = 'opacity 0.3s ease';
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 300);
          }, 2000);
        }
      }

      if (article && String(article).trim()) {
        searchInput.disabled = false;
        searchInput.value = article.trim();
        doSearch();
        if (matches.length > 0) goToMatch(0);
      }
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML.replace(/"/g, '&quot;');
    }

    /** 검색 비교용: 줄바꿈·제로폭·일부 구분 문자 제거 + 소문자. 화면 표시 문자열은 건드리지 않음. */
    function normalizeForSearch(s) {
      return String(s)
        .toLowerCase()
        .normalize('NFKC')
        .replace(/[\u200b-\u200d\ufeff\u2060\ufffc]/g, '')
        .replace(/[\s\u00ad\u034f\u115f\u1160\u17db\u180e\u2800\u3164]+/g, '');
    }

    /**
     * 칼럼 내 x 좌표가 비슷한 블록들을 그룹화 → 각 그룹 내에서 위→아래 정렬.
     * 같은 문단의 여러 줄이 연속으로 이어지도록 함.
     */
    function sortItemsReadingOrder(texts, items) {
      if (items.length === 0) return [];
      
      const byX = [...items].sort((a, b) => a.x1 - b.x1);
      const xGroups = [];
      let currentGroup = [byX[0]];
      const avgW = items.reduce((sum, it) => sum + (it.x2 - it.x1), 0) / items.length;
      const xTol = Math.max(15, avgW * 0.3);
      
      for (let i = 1; i < byX.length; i++) {
        const prev = currentGroup[currentGroup.length - 1];
        if (Math.abs(byX[i].x1 - prev.x1) <= xTol) {
          currentGroup.push(byX[i]);
        } else {
          xGroups.push(currentGroup);
          currentGroup = [byX[i]];
        }
      }
      if (currentGroup.length > 0) xGroups.push(currentGroup);
      
      const result = [];
      for (const grp of xGroups) {
        grp.sort((a, b) => a.ymid - b.ymid);
        result.push(...grp.map((it) => it.i));
      }
      return result;
    }

    /**
     * bbox 기준 읽기 순서. 좌·우 칼럼(이중어 등)은 x 간격이 큰 지점으로 나눈 뒤
     * 칼럼마다 위→아래로 이어서 전역 y→x 정렬 시 생기는 '문단 사이 영어 삽입'을 막음.
     */
    function readingOrderTextIndices(page) {
      const texts = page.texts || [];
      const items = [];
      for (let i = 0; i < texts.length; i++) {
        const b = texts[i].bbox;
        if (!b || b.length < 4) continue;
        const ymid = (b[1] + b[3]) / 2;
        items.push({ i, ymid, x1: b[0], x2: b[2], xmid: (b[0] + b[2]) / 2 });
      }
      if (items.length === 0) return [];
      const pageW = page.width || Math.max(0, ...items.map((it) => it.x2)) || 800;
      const minColGap = Math.max(20, pageW * 0.035);
      const byX = [...items].sort((a, b) => a.xmid - b.xmid);
      let bestGap = 0;
      let splitJ = -1;
      for (let j = 0; j < byX.length - 1; j++) {
        const g = byX[j + 1].xmid - byX[j].xmid;
        if (g > bestGap) {
          bestGap = g;
          splitJ = j;
        }
      }
      if (bestGap < minColGap || splitJ < 0) {
        return sortItemsReadingOrder(texts, items);
      }
      const splitX = (byX[splitJ].xmid + byX[splitJ + 1].xmid) / 2;
      const left = items.filter((it) => it.xmid < splitX);
      const right = items.filter((it) => it.xmid >= splitX);
      return [...sortItemsReadingOrder(texts, left), ...sortItemsReadingOrder(texts, right)];
    }

    /**
     * 페이지 내 연속 OCR 단위를 공백 없이 이었을 때의 문자열과 구간.
     * 여러 박스에 나뉜 문구도 하나의 검색어로 찾을 수 있음.
     */
    function buildPageConcatNorm(page, order) {
      const texts = page.texts || [];
      let full = '';
      const segs = [];
      for (let i = 0; i < order.length; i++) {
        const ti = order[i];
        const n = normalizeForSearch(texts[ti].text || '');
        if (!n) continue;
        const start = full.length;
        full += n;
        segs.push({ ti, start: start, end: full.length });
      }
      return { fullNorm: full, segs };
    }

    function collectTextIndicesForRange(segs, hitStart, hitEnd) {
      const out = [];
      for (const s of segs) {
        if (s.end > hitStart && s.start < hitEnd) out.push(s.ti);
      }
      return out;
    }

    function doSearch() {
      const q = normalizeForSearch(searchInput.value);
      matches = [];
      currentMatchIndex = -1;

      document.querySelectorAll('.word-box').forEach(box => {
        box.classList.remove('dim', 'match', 'match-active');
        box.style.display = '';
      });
      document.querySelectorAll('.page-card').forEach(c => c.classList.remove('highlight'));

      if (!q || !data?.pages) {
        matchBadge.textContent = '';
        matchBadge.className = 'match-badge';
        prevBtn.disabled = nextBtn.disabled = true;
        return;
      }

      const matchedKey = new Set();

      data.pages.forEach((page, pageIdx) => {
        const order = readingOrderTextIndices(page);
        const { fullNorm, segs } = buildPageConcatNorm(page, order);
        let pos = 0;
        while (pos <= fullNorm.length - q.length) {
          const hit = fullNorm.indexOf(q, pos);
          if (hit === -1) break;
          const hitEnd = hit + q.length;
          const textIndices = collectTextIndicesForRange(segs, hit, hitEnd);
          const primary = textIndices.length ? textIndices[0] : -1;
          const refText = primary >= 0 ? ((page.texts || [])[primary] || {}).text || '' : '';
          matches.push({ pageIdx, textIndices, textIdx: primary, text: refText });
          textIndices.forEach((ti) => matchedKey.add(`${pageIdx}:${ti}`));
          pos = hit + q.length;
        }
      });

      document.querySelectorAll('.word-box').forEach(box => {
        const page = box.dataset.page;
        const tidx = box.dataset.textIdx;
        const key = `${page}:${tidx}`;
        if (matchedKey.has(key)) {
          box.classList.add('match');
        } else {
          box.classList.add('dim');
        }
      });

      if (matches.length > 0) {
        currentMatchIndex = 0;
        goToMatch(0);
        prevBtn.disabled = nextBtn.disabled = false;
      } else {
        matchBadge.textContent = '검색 결과 없음';
        matchBadge.className = 'match-badge no-results';
        prevBtn.disabled = nextBtn.disabled = true;
      }
    }

    function goToMatch(idx) {
      if (matches.length === 0) return;
      
      if (idx < 0) idx = matches.length - 1;
      else if (idx >= matches.length) idx = 0;
      
      currentMatchIndex = idx;
      const m = matches[idx];

      document.querySelectorAll('.word-box').forEach(b => b.classList.remove('match-active'));
      const indices = m.textIndices && m.textIndices.length
        ? m.textIndices
        : (m.textIdx >= 0 ? [m.textIdx] : []);
      
      indices.forEach((ti) => {
        const activeBox = document.querySelector(
          `.word-box[data-page="${m.pageIdx}"][data-text-idx="${ti}"]`
        );
        if (activeBox) activeBox.classList.add('match-active');
      });

      const card = document.getElementById(`page-${m.pageIdx}`);
      if (card) {
        document.querySelectorAll('.page-card').forEach(c => c.classList.remove('highlight'));
        card.classList.add('highlight');
        
        const allActive = card.querySelectorAll('.word-box.match-active');
        if (allActive.length > 0) {
          const boxes = Array.from(allActive);
          boxes.sort((a, b) => {
            const aTop = parseFloat(a.style.top || 0);
            const bTop = parseFloat(b.style.top || 0);
            if (Math.abs(aTop - bTop) > 5) return aTop - bTop;
            return parseFloat(a.style.left || 0) - parseFloat(b.style.left || 0);
          });
          boxes[0].scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
        } else {
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
      
      matchBadge.className = 'match-badge has-results';
      matchBadge.innerHTML =
        '<span>' + (idx + 1) + '</span><span class="sep">/</span><span>' + matches.length + '</span>';
    }

    searchInput.addEventListener('input', () => doSearch());
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (e.shiftKey) goToMatch(currentMatchIndex - 1);
        else goToMatch(currentMatchIndex + 1);
      }
    });
    prevBtn.addEventListener('click', () => goToMatch(currentMatchIndex - 1));
    nextBtn.addEventListener('click', () => goToMatch(currentMatchIndex + 1));

    (async function initFromToken() {
      const token = new URLSearchParams(window.location.search).get('token');
      if (!token) return;
      content.classList.add('loading');
      content.innerHTML = '<div class="empty-state loading-msg"><p>OCR 결과 불러오는 중…</p></div>';
      try {
        const res = await fetch('/api/session/' + encodeURIComponent(token));
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          const msg = typeof err.detail === 'string' ? err.detail : (res.statusText || '오류');
          throw new Error(msg);
        }
        const session = await res.json();
        data = { pages: session.pages || [] };
        window.__pendingNavHint = session.navigate || null;
        content.classList.remove('loading');
        render();
      } catch (err) {
        content.classList.remove('loading');
        content.innerHTML = '<div class="empty-state"><p class="lead">세션을 불러올 수 없습니다</p><p>' + (err.message || String(err)) + '</p></div>';
      }
    })();
  </script>
</body>
